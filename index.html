<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SueroGest - Gestión de Sueroterapia</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @media print {
      body, html {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
      }

      .no-print {
        display: none !important;
      }

      .print-area {
        width: 100% !important;
        max-width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border: none !important;
        min-height: auto !important;
      }

      aside, header {
        display: none !important;
      }

      main {
        padding: 0 !important;
        margin: 0 !important;
        overflow: visible !important;
      }

      table, tr, td, th,
      .avoid-break,
      h1, h2, h3 {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      h1, h2, h3 {
        page-break-after: avoid;
      }

      @page {
        margin: 1.5cm;
      }
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    const Icon = ({ className, children }) => (
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="2"
        strokeLinecap="round"
        strokeLinejoin="round"
        className={className || "w-5 h-5"}
      >
        {children}
      </svg>
    );

    const Activity = ({className}) => <Icon className={className}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>;
    const Calculator = ({className}) => <Icon className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><path d="M8 6h0"/><path d="M16 6h0"/><path d="M12 6h0"/><path d="M8 10h0"/><path d="M16 10h0"/><path d="M12 10h0"/><path d="M8 14h0"/><path d="M16 14h0"/><path d="M12 14h0"/><path d="M8 18h0"/><path d="M16 18h0"/><path d="M12 18h0"/></Icon>;
    const FileText = ({className}) => <Icon className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></Icon>;
    const ShoppingCart = ({className}) => <Icon className={className}><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></Icon>;
    const Printer = ({className}) => <Icon className={className}><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6"/><rect x="6" y="14" width="12" height="8" rx="1"/></Icon>;
    const Stethoscope = ({className}) => <Icon className={className}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></Icon>;
    const Clock = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></Icon>;
    const Euro = ({className}) => <Icon className={className}><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></Icon>;
    const TrendingUp = ({className}) => <Icon className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></Icon>;
    const Plus = ({className}) => <Icon className={className}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const Minus = ({className}) => <Icon className={className}><path d="M5 12h14"/></Icon>;
    const CheckCircle2 = ({className}) => <Icon className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const FilePlus = ({className}) => <Icon className={className}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M9 15h6"/><path d="M12 12v6"/></Icon>;

    const protocolsData = [
      {
        id: 'anti-estres',
        name: 'Anti-Estrés y Regulación Nerviosa',
        objective: 'Equilibrar el sistema nervioso, reducir la ansiedad, mejorar el sueño y restaurar energía.',
        duration: 45,
        baseCost: 38.13,
        suggestedPrice: 95.00,
        ingredients: [
          { name: 'Suero Fisiológico NaCl', dose: '500 ml', quantityPerSession: 1, type: 'base', orderName: 'SUERO FISIOLOGICO 500ML' },
          { name: 'Vitamina C (500mg/ml)', dose: '7.5 g (15 ml)', quantityPerSession: 15, unit: 'ml', type: 'vial', orderName: 'VITAMINA C 500MG/ML' },
          { name: 'Ácido Fólico', dose: '5 mg', quantityPerSession: 1, type: 'ampolla', orderName: 'ACIDO FOLICO 5MG' },
          { name: 'Magnesio', dose: '500 mg', quantityPerSession: 1, type: 'vial', orderName: 'SULFATO DE MAGNESIO 500MG/ML' },
          { name: 'Complejo B (B1-B6-B12)', dose: '1 dosis', quantityPerSession: 1, type: 'vial', orderName: 'COMPLEJO B X 10ML' },
          { name: 'Taurina', dose: '500 mg', quantityPerSession: 1, type: 'vial', orderName: 'TAURINA 50MG/ML' },
          { name: 'Inositol', dose: '500 mg', quantityPerSession: 1, type: 'vial', orderName: 'INOSITOL 50MG/ML' }
        ]
      },
      {
        id: 'energizante',
        name: 'Energizante y Rendimiento Físico',
        objective: 'Aumentar vitalidad, energía celular y rendimiento físico.',
        duration: 90,
        baseCost: 119.00,
        suggestedPrice: 160.00,
        ingredients: [
          { name: 'Suero Fisiológico NaCl', dose: '500 ml', quantityPerSession: 1, type: 'base', orderName: 'SUERO FISIOLOGICO 500ML' },
          { name: 'NAD+ (100mg/ml)', dose: '500 mg (5 ml)', quantityPerSession: 5, unit: 'ml', type: 'vial', orderName: 'NAD+ 100MG/ML' },
          { name: 'Acetil-L-Carnitina', dose: '400 mg', quantityPerSession: 1, type: 'vial', orderName: 'ACETIL-L-CARNITINA' },
          { name: 'Arginina', dose: '100 mg', quantityPerSession: 1, type: 'vial', orderName: 'ARGININA' },
          { name: 'Complejo B (B1-B5-B6-B12)', dose: '1 dosis', quantityPerSession: 1, type: 'vial', orderName: 'COMPLEJO B X 10ML' },
          { name: 'Magnesio', dose: '500 mg', quantityPerSession: 1, type: 'vial', orderName: 'SULFATO DE MAGNESIO 500MG/ML' }
        ]
      },
      {
        id: 'antiedad',
        name: 'Antiedad y Rejuvenecimiento Celular',
        objective: 'Mejorar el estado de la piel, el cabello y la energía mitocondrial.',
        duration: 60,
        baseCost: 41.50,
        suggestedPrice: 120.00,
        ingredients: [
          { name: 'Suero Fisiológico NaCl', dose: '500 ml', quantityPerSession: 1, type: 'base', orderName: 'SUERO FISIOLOGICO 500ML' },
          { name: 'Glutatión Reducido', dose: '600 mg', quantityPerSession: 1, type: 'vial', orderName: 'GLUTATION REDUCIDO 150MG/ML' },
          { name: 'Vitamina C', dose: '7.5 g', quantityPerSession: 15, unit: 'ml', type: 'vial', orderName: 'VITAMINA C 500MG/ML' },
          { name: 'Zinc', dose: '10 mg', quantityPerSession: 1, type: 'vial', orderName: 'VIALES (ZINC, SELENIO, ...)' },
          { name: 'Selenio', dose: '100 mcg', quantityPerSession: 1, type: 'vial', orderName: 'VIALES (ZINC, SELENIO, ...)' },
          { name: 'Complejo B', dose: '1 dosis', quantityPerSession: 1, type: 'vial', orderName: 'COMPLEJO B X 10ML' },
          { name: 'Taurina', dose: '500 mg', quantityPerSession: 1, type: 'vial', orderName: 'TAURINA 50MG/ML' }
        ]
      },
      {
        id: 'inmunidad',
        name: 'Inmunidad y Defensa',
        objective: 'Reforzar el sistema inmunológico, prevenir infecciones y reducir la inflamación.',
        duration: 60,
        baseCost: 24.50,
        suggestedPrice: 120.00,
        ingredients: [
          { name: 'Suero Fisiológico NaCl', dose: '500 ml', quantityPerSession: 1, type: 'base', orderName: 'SUERO FISIOLOGICO 500ML' },
          { name: 'Vitamina C', dose: '10 g', quantityPerSession: 20, unit: 'ml', type: 'vial', orderName: 'VITAMINA C 500MG/ML' },
          { name: 'Zinc', dose: '10 mg', quantityPerSession: 1, type: 'vial', orderName: 'VIALES (ZINC, SELENIO, ...)' },
          { name: 'Selenio', dose: '100 mcg', quantityPerSession: 1, type: 'vial', orderName: 'VIALES (ZINC, SELENIO, ...)' },
          { name: 'Vitamina D', dose: '25,000 UI', quantityPerSession: 1, type: 'ampolla', orderName: 'VITAMINA D 25.000 UI' },
          { name: 'Vitamina B6', dose: '200 mg', quantityPerSession: 1, type: 'vial', orderName: 'VITAMINA B6' },
          { name: 'Vitamina B12', dose: '1,000 mcg', quantityPerSession: 1, type: 'vial', orderName: 'VITAMINA B12' }
        ]
      }
    ];

    const STORAGE_KEY = 'suerogest_protocols_v13';

    const normalizeMoney = (value, fallback = 0) => {
      const parsed = parseFloat(String(value).replace(',', '.'));
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : fallback;
    };

    const normalizePositiveInt = (value, fallback = 1) => {
      const parsed = parseInt(value, 10);
      return Number.isFinite(parsed) && parsed > 0 ? parsed : fallback;
    };

    const generateDocumentRef = (protocolName) => {
      const prefix = (protocolName || 'DOC').replace(/[^A-Za-z0-9]/g, '').substring(0, 3).toUpperCase() || 'DOC';
      const suffix = Date.now().toString().slice(-6);
      return `${prefix}-${suffix}`;
    };

    function App() {
      const [protocols, setProtocols] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (!saved) return protocolsData;
          const parsed = JSON.parse(saved);
          return Array.isArray(parsed) && parsed.length > 0 ? parsed : protocolsData;
        } catch {
          return protocolsData;
        }
      });

      const [activeTab, setActiveTab] = useState('dashboard');
      const [selectedProtocolId, setSelectedProtocolId] = useState(() => {
        return protocolsData[0]?.id || '';
      });
      const [sessions, setSessions] = useState(1);
      const [patientName, setPatientName] = useState('');
      const [importText, setImportText] = useState('');
      const [documentRef, setDocumentRef] = useState(() => generateDocumentRef(protocolsData[0]?.name || 'DOC'));

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(protocols));
      }, [protocols]);

      const selectedProtocol = useMemo(() =>
        protocols.find(p => p.id === selectedProtocolId) || protocols[0],
      [selectedProtocolId, protocols]);

      useEffect(() => {
        if (!selectedProtocol) return;
        setDocumentRef(generateDocumentRef(selectedProtocol.name));
      }, [selectedProtocolId, selectedProtocol?.name]);

      useEffect(() => {
        if (!selectedProtocol && protocols.length > 0) {
          setSelectedProtocolId(protocols[0].id);
        }
      }, [protocols, selectedProtocol]);

      const handlePrint = () => {
        window.print();
      };

      const handleImportProtocol = () => {
        if (!importText.trim()) return;

        const lines = importText
          .split('\n')
          .map(l => l.trim())
          .filter(Boolean);

        let name = "Protocolo Personalizado";
        let objective = "Objetivo definido por el usuario";
        let duration = 60;
        let baseCost = 0;
        let suggestedPrice = 100;
        let ingredients = [];
        let parsingIngredients = false;

        lines.forEach((line, index) => {
          const lower = line.toLowerCase();

          if (
            index === 0 &&
            !lower.includes('objetivo') &&
            !/^[-*•]/.test(line)
          ) {
            name = line.replace(/protocolo\s*(de)?/i, '').trim() || name;
          }

          const objMatch = line.match(/Objetivo:\s*(.*)/i);
          if (objMatch?.[1]) {
            objective = objMatch[1].trim();
          }

          const durMatch = line.match(/Duraci[oó]n.*?(\d+)/i);
          if (durMatch?.[1]) {
            duration = normalizePositiveInt(durMatch[1], 60);
          }

          const costMatch = line.match(/(?:Coste|Costo).*?(?:estimado|aprox|aproximado)?[^0-9]*([\d.,]+)/i);
          if (costMatch?.[1]) {
            baseCost = normalizeMoney(costMatch[1], 0);
          }

          const priceMatch = line.match(/(?:Precio|PVP).*?([\d.,]+)/i);
          if (priceMatch?.[1]) {
            suggestedPrice = normalizeMoney(priceMatch[1], 100);
          }

          if (
            lower.startsWith('composición') ||
            lower.startsWith('composicion') ||
            lower.startsWith('ingredientes')
          ) {
            parsingIngredients = true;
            return;
          }

          if (parsingIngredients) {
            if (/^[-*•]\s+/.test(line)) {
              const ingMatch = line.match(/^[-*•]\s+(.*?)(?:\s+\((?:Coste|Costo).*?:?\s*([\d.,]+)\s*€?\))?$/i);
              if (ingMatch) {
                const rawName = ingMatch[1].trim();
                const cost = ingMatch[2] ? normalizeMoney(ingMatch[2], 0) : 0;

                if (rawName) {
                  ingredients.push({
                    name: rawName,
                    dose: 'Según texto',
                    quantityPerSession: 1,
                    type: 'vial',
                    orderName: rawName.toUpperCase(),
                    estimatedCost: cost
                  });
                }
              }
            } else if (
              lower.includes('duración') ||
              lower.includes('duracion') ||
              lower.includes('coste') ||
              lower.includes('costo') ||
              lower.includes('precio') ||
              lower.includes('pvp')
            ) {
              parsingIngredients = false;
            }
          }
        });

        if (baseCost === 0 && ingredients.length > 0) {
          baseCost = ingredients.reduce((sum, ing) => sum + (ing.estimatedCost || 0), 0);
        }

        if (!name.trim()) name = 'Protocolo Personalizado';
        if (!objective.trim()) objective = 'Objetivo definido por el usuario';
        duration = normalizePositiveInt(duration, 60);
        baseCost = normalizeMoney(baseCost, 0);
        suggestedPrice = normalizeMoney(suggestedPrice, 100);

        const newProtocol = {
          id: 'custom-' + Date.now(),
          name,
          objective,
          duration,
          baseCost,
          suggestedPrice,
          ingredients: ingredients.length > 0
            ? ingredients
            : [{
                name: 'Fórmula Magistral Personalizada',
                dose: '1 dosis',
                quantityPerSession: 1,
                type: 'vial',
                orderName: 'FÓRMULA PERSONALIZADA'
              }]
        };

        setProtocols(prev => [...prev, newProtocol]);
        setSelectedProtocolId(newProtocol.id);
        setImportText('');
        setActiveTab('calculator');
      };

      const renderImport = () => (
        <div className="max-w-4xl mx-auto space-y-6">
          <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
            <h2 className="text-2xl font-bold text-gray-800 mb-2">Añadir Protocolo Propio</h2>
            <p className="text-gray-500 mb-6">Pega aquí el texto de tu protocolo. El sistema intentará extraer ingredientes, tiempos, costes y precios.</p>

            <div className="mb-6 bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm text-blue-800">
              <strong>Formato recomendado:</strong><br/>
              <span className="font-mono text-xs mt-2 block opacity-80">
                Protocolo Detox Avanzado<br/>
                Objetivo: Limpieza hepática celular.<br/>
                Composición:<br/>
                - 500 ml NaCl (Coste aprox: 0 €)<br/>
                - Vitamina C 10 g (Coste aprox: 10 €)<br/>
                Duración estimada: 60 minutos<br/>
                Coste total estimado: 10 €<br/>
                Precio de venta sugerido: 120 €
              </span>
            </div>

            <textarea
              className="w-full h-64 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow text-gray-700 font-mono text-sm mb-4"
              placeholder="Pega el texto de tu protocolo aquí..."
              value={importText}
              onChange={(e) => setImportText(e.target.value)}
            ></textarea>

            <button
              onClick={handleImportProtocol}
              disabled={!importText.trim()}
              className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white p-4 rounded-xl font-semibold text-lg flex justify-center items-center transition shadow-sm hover:shadow-md"
            >
              <FilePlus className="w-5 h-5 mr-2" />
              Procesar y Guardar Protocolo
            </button>
          </div>
        </div>
      );

      const renderDashboard = () => (
        <div className="space-y-6 max-w-6xl mx-auto">
          <h2 className="text-2xl font-bold text-gray-800 mb-6">Catálogo de Protocolos</h2>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
            {protocols.map(protocol => (
              <div
                key={protocol.id}
                className={`p-6 rounded-xl border-2 transition-all cursor-pointer flex flex-col h-full ${selectedProtocolId === protocol.id ? 'border-blue-500 bg-blue-50 shadow-md' : 'border-gray-100 bg-white hover:border-blue-200 shadow-sm'}`}
                onClick={() => {
                  setSelectedProtocolId(protocol.id);
                  setActiveTab('calculator');
                }}
              >
                <div className="flex justify-between items-start mb-3">
                  <h3 className="text-xl font-bold text-gray-800 flex items-center leading-tight">
                    <Activity className="w-5 h-5 mr-2 text-blue-600 flex-shrink-0" />
                    {protocol.name}
                  </h3>
                </div>

                <p className="text-gray-600 text-sm mb-5 flex-grow leading-relaxed">
                  {protocol.objective}
                </p>

                <div className="flex flex-col sm:flex-row sm:items-center justify-between text-sm gap-2 mb-5">
                  <span className="flex items-center text-gray-600 bg-white/60 px-3 py-1.5 rounded-md border border-gray-200">
                    <Clock className="w-4 h-4 mr-1.5 text-gray-500"/> {protocol.duration} min
                  </span>
                  <span className="flex items-center font-semibold text-emerald-700 bg-emerald-50 px-3 py-1.5 rounded-md border border-emerald-100">
                    <Euro className="w-4 h-4 mr-1"/> {Number(protocol.suggestedPrice).toFixed(2)} € / sesión
                  </span>
                </div>

                <div className="pt-4 border-t border-gray-200/80 mt-auto">
                  <p className="text-xs text-gray-500 font-bold tracking-wider mb-3">COMPOSICIÓN PRINCIPAL:</p>
                  <div className="flex flex-wrap gap-2">
                    {protocol.ingredients.slice(1, 4).map((ing, idx) => (
                      <span key={idx} className="px-2.5 py-1 bg-white border border-gray-200 rounded-md text-xs text-gray-700 font-medium shadow-sm">
                        {ing.name}
                      </span>
                    ))}
                    {protocol.ingredients.length > 4 && (
                      <span className="px-2.5 py-1 bg-gray-100 rounded-md text-xs text-gray-500 font-medium">
                        +{protocol.ingredients.length - 4} más
                      </span>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      const renderCalculator = () => {
        const totalCost = (selectedProtocol?.baseCost || 0) * sessions;
        const totalPrice = (selectedProtocol?.suggestedPrice || 0) * sessions;
        const totalProfit = totalPrice - totalCost;
        const margin = totalPrice > 0 ? ((totalProfit / totalPrice) * 100).toFixed(1) : '0.0';

        return (
          <div className="space-y-6 max-w-5xl mx-auto">
            <div className="bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
              <h2 className="text-2xl font-bold text-gray-800 mb-2">Gestión y Cálculo de Tratamiento</h2>
              <p className="text-gray-500 mb-8">Configura las variables del plan para visualizar el desglose financiero.</p>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div className="space-y-6">
                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Protocolo Seleccionado</label>
                    <select
                      className="w-full p-3.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow bg-gray-50 text-gray-800 font-medium"
                      value={selectedProtocolId}
                      onChange={(e) => setSelectedProtocolId(e.target.value)}
                    >
                      {protocols.map(p => (
                        <option key={p.id} value={p.id}>{p.name}</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Nombre del Paciente (Opcional)</label>
                    <input
                      type="text"
                      placeholder="Ej. Luzdivina Ramón"
                      className="w-full p-3.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-shadow text-gray-800"
                      value={patientName}
                      onChange={(e) => setPatientName(e.target.value)}
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-semibold text-gray-700 mb-2">Número de Sesiones</label>
                    <div className="flex items-center shadow-sm rounded-lg overflow-hidden border border-gray-200">
                      <button
                        onClick={() => setSessions(prev => Math.max(1, prev - 1))}
                        className="p-4 bg-gray-100 hover:bg-gray-200 text-gray-600 transition-colors w-16 flex justify-center"
                      >
                        <Minus className="w-5 h-5" />
                      </button>
                      <div className="flex-1 text-center py-3.5 bg-white font-bold text-xl text-blue-700">
                        {sessions}
                      </div>
                      <button
                        onClick={() => setSessions(prev => prev + 1)}
                        className="p-4 bg-gray-100 hover:bg-gray-200 text-gray-600 transition-colors w-16 flex justify-center"
                      >
                        <Plus className="w-5 h-5" />
                      </button>
                    </div>
                  </div>
                </div>

                <div className="bg-slate-50 p-6 md:p-8 rounded-xl border border-slate-200 flex flex-col justify-center h-full">
                  <h3 className="font-bold text-lg text-slate-800 border-b border-slate-200 pb-3 mb-5 flex items-center">
                    <Calculator className="w-5 h-5 mr-2 text-slate-500"/>
                    Resumen Financiero del Plan
                  </h3>

                  <div className="space-y-4 flex-grow">
                    <div className="flex justify-between items-center text-lg">
                      <span className="text-slate-600 font-medium">Coste Clínica (Base):</span>
                      <span className="font-semibold text-red-600">{totalCost.toFixed(2)} €</span>
                    </div>

                    <div className="flex justify-between items-center text-lg">
                      <span className="text-slate-600 font-medium">PVP Paciente sugerido:</span>
                      <span className="font-semibold text-blue-700">{totalPrice.toFixed(2)} €</span>
                    </div>
                  </div>

                  <div className="mt-6 pt-5 border-t border-slate-200">
                    <div className="flex justify-between items-end">
                      <span className="text-slate-800 font-bold flex items-center">
                        <TrendingUp className="w-5 h-5 mr-2 text-emerald-500" />
                        Beneficio Bruto:
                      </span>
                      <div className="text-right">
                        <span className="font-bold text-3xl text-emerald-600 block leading-none mb-1">
                          {totalProfit.toFixed(2)} €
                        </span>
                        <span className="text-sm font-medium text-emerald-800 bg-emerald-100 px-2 py-0.5 rounded-md">
                          Margen: {margin}%
                        </span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="flex flex-col sm:flex-row gap-4">
              <button
                onClick={() => setActiveTab('ficha')}
                className="flex-1 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-semibold text-lg flex justify-center items-center transition shadow-sm hover:shadow-md"
              >
                <FileText className="w-5 h-5 mr-2" />
                Generar Ficha Clínica
              </button>
              <button
                onClick={() => setActiveTab('pedido')}
                className="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white p-4 rounded-xl font-semibold text-lg flex justify-center items-center transition shadow-sm hover:shadow-md"
              >
                <ShoppingCart className="w-5 h-5 mr-2" />
                Generar Pedido Farmacia
              </button>
            </div>
          </div>
        );
      };

      const renderFicha = () => (
        <div className="max-w-4xl mx-auto pb-10">
          <div className="flex justify-between items-center no-print mb-6">
            <p className="text-gray-500 text-sm">Vista previa del documento generado (A4)</p>
            <button onClick={handlePrint} className="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2.5 rounded-lg flex items-center shadow-sm transition font-medium">
              <Printer className="w-5 h-5 mr-2" /> Imprimir Documento
            </button>
          </div>

          <div className="print-area bg-white p-8 md:p-14 rounded-xl md:shadow-lg border border-gray-200 min-h-[1056px] flex flex-col">
            <div className="flex justify-between items-start border-b-2 border-gray-800 pb-6 mb-8 avoid-break">
              <div>
                <h1 className="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">FICHA TÉCNICA DE INFUSIÓN</h1>
                <p className="text-gray-500 font-medium">Documento Clínico - Uso Interno</p>
              </div>
              <div className="text-right">
                <Stethoscope className="w-10 h-10 text-gray-300 ml-auto mb-2" />
                <p className="text-sm text-gray-600 font-semibold">Fecha: {new Date().toLocaleDateString('es-ES')}</p>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-8 mb-10 avoid-break">
              <div>
                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Paciente</h3>
                <p className="font-semibold text-xl text-gray-800 border-b border-gray-200 pb-1 break-words">
                  {patientName || "___________________________"}
                </p>
              </div>
              <div>
                <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1.5">Sesión</h3>
                <p className="font-semibold text-xl text-gray-800 border-b border-gray-200 pb-1">
                  ___ de {sessions}
                </p>
              </div>
            </div>

            <div className="bg-blue-50/80 border border-blue-100 p-6 rounded-lg mb-10 avoid-break">
              <h2 className="text-xl font-bold text-blue-900 mb-2">{selectedProtocol.name}</h2>
              <p className="text-blue-800 text-sm mb-5 pr-4 leading-relaxed">{selectedProtocol.objective}</p>
              <div className="flex flex-wrap gap-4 text-sm">
                <span className="flex items-center font-medium text-blue-900 bg-white px-3 py-1.5 rounded-md shadow-sm border border-blue-100">
                  <Clock className="w-4 h-4 mr-2 text-blue-600" /> Tiempo estimado: {selectedProtocol.duration} min
                </span>
                <span className="flex items-center font-medium text-blue-900 bg-white px-3 py-1.5 rounded-md shadow-sm border border-blue-100">
                  <Activity className="w-4 h-4 mr-2 text-blue-600" /> Vía: Intravenosa (IV)
                </span>
              </div>
            </div>

            <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
              <CheckCircle2 className="w-5 h-5 mr-2 text-emerald-500" /> Composición a Preparar
            </h3>

            <div className="overflow-x-auto">
              <table className="w-full text-left border-collapse mb-10">
                <thead>
                  <tr className="bg-gray-50 border-y-2 border-gray-200">
                    <th className="py-3 px-4 font-bold text-sm text-gray-600 w-1/2">Principio Activo</th>
                    <th className="py-3 px-4 font-bold text-sm text-gray-600">Dosis por Sesión</th>
                    <th className="py-3 px-4 font-bold text-sm text-gray-600 w-24 text-center">Check</th>
                  </tr>
                </thead>
                <tbody>
                  {selectedProtocol.ingredients.map((ing, idx) => (
                    <tr key={idx} className="border-b border-gray-100 hover:bg-gray-50/50">
                      <td className="py-3.5 px-4 text-gray-800 font-semibold break-words">{ing.name}</td>
                      <td className="py-3.5 px-4 text-gray-600 font-medium">{ing.dose}</td>
                      <td className="py-3.5 px-4 text-center">
                        <div className="w-6 h-6 border-2 border-gray-300 rounded mx-auto bg-white"></div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="mt-auto">
              <div className="border-t-2 border-gray-100 pt-8 mb-12 avoid-break">
                <h3 className="font-bold text-gray-800 mb-3 text-lg">Instrucciones de Aplicación:</h3>
                <ul className="list-disc pl-5 space-y-2.5 text-gray-600 text-sm leading-relaxed">
                  <li>Canalizar vía periférica con abocath nº 22G o 20G.</li>
                  <li>Extraer los viales de forma estéril e introducir en el suero base. Mezclar suavemente.</li>
                  <li>Purgar el sistema de suero asegurando la total ausencia de burbujas de aire.</li>
                  <li>Iniciar infusión a goteo lento (20-30 gotas/min) durante los primeros 5-10 minutos para evaluar tolerancia del paciente.</li>
                  <li>Aumentar velocidad según tolerancia hasta completar en el tiempo estimado de <strong>{selectedProtocol.duration} minutos</strong>.</li>
                  <li>Vigilar constantes vitales. Si el paciente refiere escozor en la zona de punción, ralentizar el ritmo de goteo.</li>
                </ul>
              </div>

              <div className="pt-8 border-t border-gray-300 flex justify-between px-4 md:px-12 avoid-break">
                <div className="text-center">
                  <div className="border-b border-gray-400 w-48 mb-2"></div>
                  <p className="text-xs text-gray-500 font-medium uppercase tracking-wider">Médico Responsable</p>
                </div>
                <div className="text-center">
                  <div className="border-b border-gray-400 w-48 mb-2"></div>
                  <p className="text-xs text-gray-500 font-medium uppercase tracking-wider">Firma D.U.E.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );

      const renderPedido = () => {
        const orderItems = selectedProtocol.ingredients.map(ing => {
          const perSessionQty = Number(ing.quantityPerSession) || 0;
          const totalRequired = perSessionQty * sessions;
          const isMl = ing.unit === 'ml';

          let qtyDisplay = totalRequired;
          let orderText = ing.orderName;
          let observation = 'Uso clínico';

          if (isMl) {
            qtyDisplay = 'Revisar';
            orderText += ` (Total a infundir: ${totalRequired} ml)`;
            observation = 'Revisar presentación comercial';
          }

          return {
            qty: qtyDisplay,
            name: orderText,
            isMl,
            observation
          };
        });

        return (
          <div className="max-w-4xl mx-auto pb-10">
            <div className="flex justify-between items-center no-print mb-6">
              <p className="text-gray-500 text-sm">Vista previa del pedido (A4)</p>
              <button onClick={handlePrint} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-lg flex items-center shadow-sm transition font-medium">
                <Printer className="w-5 h-5 mr-2" /> Imprimir Pedido
              </button>
            </div>

            <div className="print-area bg-white p-8 md:p-14 rounded-xl md:shadow-lg border border-gray-200 min-h-[1056px] flex flex-col">
              <div className="flex flex-col md:flex-row justify-between items-start mb-12 border-b-2 border-gray-100 pb-8 gap-6 avoid-break">
                <div className="flex-1">
                  <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">SOLICITUD DE PEDIDO</h1>
                  <p className="text-sm text-gray-500 mt-1 font-medium">Ref: {documentRef}</p>

                  <div className="mt-8 border-l-4 border-blue-500 pl-4 bg-gray-50 p-4 rounded-r-lg">
                    <h3 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-1">Referencia / Paciente</h3>
                    <p className="text-gray-900 font-bold text-lg break-words">{patientName || "Stock General Clínica"}</p>
                    <p className="text-blue-700 text-sm font-medium mt-1">Tratamiento programado: {sessions} sesión/es de {selectedProtocol.name}</p>
                  </div>
                </div>

                <div className="text-left md:text-right text-sm bg-gray-50 p-5 rounded-lg border border-gray-100 md:bg-transparent md:border-transparent md:p-0">
                  <h2 className="text-lg font-extrabold text-blue-900 mb-2">FARMACIA J.F. BARRACHINA</h2>
                  <p className="text-gray-600 font-medium">Avenida de la Marina, 25 Playa</p>
                  <p className="text-gray-600 font-medium">46760 Tavernes de la Valldigna (VALENCIA)</p>
                  <p className="text-gray-600 mt-2">Tel: 96 288 40 53 | Fax: 96 288 43 19</p>
                  <p className="text-blue-600 font-semibold mt-1">formulacion@farmaciabarrachina.com</p>
                  <p className="text-gray-400 text-xs mt-2">NIF 24300255-L</p>
                </div>
              </div>

              <div className="overflow-x-auto flex-grow">
                <table className="w-full text-left border-collapse mb-8">
                  <thead>
                    <tr className="bg-gray-100 border-y-2 border-gray-300">
                      <th className="py-3.5 px-4 font-bold text-sm text-gray-700 w-24 text-center">CANTIDAD</th>
                      <th className="py-3.5 px-4 font-bold text-sm text-gray-700">CONCEPTO / FORMULACIÓN MAGISTRAL</th>
                      <th className="py-3.5 px-4 font-bold text-sm text-gray-700 text-right w-40">OBSERVACIONES</th>
                    </tr>
                  </thead>
                  <tbody>
                    {orderItems.map((item, idx) => (
                      <tr key={idx} className="border-b border-gray-200 hover:bg-gray-50 transition-colors">
                        <td className="py-4 px-4 text-center font-bold text-lg text-gray-800 bg-gray-50/50">{item.qty}</td>
                        <td className="py-4 px-4 text-gray-800 font-semibold break-words">
                          {item.name}
                          {item.isMl && (
                            <p className="text-xs text-gray-500 mt-1.5 font-normal">
                              *Confirmar formato comercial del vial o ampolla antes de cursar el pedido.
                            </p>
                          )}
                        </td>
                        <td className="py-4 px-4 text-right text-gray-500 text-sm font-medium">{item.observation}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>

              <div className="flex justify-end mt-8 mb-12 avoid-break">
                <div className="bg-gray-50 p-6 rounded-xl border border-gray-200 w-72 shadow-sm">
                  <p className="text-sm text-gray-500 font-semibold mb-2 uppercase tracking-wider">Base Imponible Est.</p>
                  <p className="text-3xl font-bold text-gray-800">~ {(selectedProtocol.baseCost * sessions).toFixed(2)} €</p>
                  <p className="text-xs text-gray-400 mt-3 leading-tight">*Precio orientativo. Sujeto a cotización y disponibilidad por parte de la farmacia.</p>
                </div>
              </div>

              <div className="mt-auto pt-6 border-t-2 border-gray-100 text-xs text-justify text-gray-400 leading-relaxed avoid-break">
                <p><strong>Aviso legal:</strong> Este documento es una solicitud proforma de presupuesto o pedido de formulación magistral/viales para uso clínico profesional. La prescripción final y administración es responsabilidad exclusiva del profesional médico solicitante. Documento generado automáticamente a través de plataforma clínica.</p>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="flex h-screen overflow-hidden">
          <aside className="w-64 bg-slate-900 text-white flex flex-col no-print shadow-xl relative z-20 flex-shrink-0">
            <div className="p-6 border-b border-slate-800">
              <div className="flex items-center gap-3">
                <div className="bg-blue-600 p-2.5 rounded-lg shadow-inner">
                  <Activity className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="font-bold text-xl leading-tight tracking-wide">SueroGest</h1>
                  <p className="text-blue-300 text-xs font-medium tracking-wider uppercase mt-0.5">Clínica Admin</p>
                </div>
              </div>
            </div>

            <nav className="flex-1 p-4 space-y-1.5 overflow-y-auto">
              <button
                onClick={() => setActiveTab('dashboard')}
                className={`w-full flex items-center p-3.5 rounded-lg transition-all font-medium ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
              >
                <Activity className="w-5 h-5 mr-3" /> Catálogo
              </button>
              <button
                onClick={() => setActiveTab('calculator')}
                className={`w-full flex items-center p-3.5 rounded-lg transition-all font-medium ${activeTab === 'calculator' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
              >
                <Calculator className="w-5 h-5 mr-3" /> Calculadora
              </button>
              <button
                onClick={() => setActiveTab('import')}
                className={`w-full flex items-center p-3.5 rounded-lg transition-all font-medium ${activeTab === 'import' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
              >
                <FilePlus className="w-5 h-5 mr-3" /> Nuevo Protocolo
              </button>
              <div className="pt-4 pb-2">
                <p className="px-3 text-xs font-bold text-slate-500 uppercase tracking-wider">Documentos</p>
              </div>
              <button
                onClick={() => setActiveTab('ficha')}
                className={`w-full flex items-center p-3.5 rounded-lg transition-all font-medium ${activeTab === 'ficha' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
              >
                <FileText className="w-5 h-5 mr-3 text-blue-400" /> Ficha Técnica
              </button>
              <button
                onClick={() => setActiveTab('pedido')}
                className={`w-full flex items-center p-3.5 rounded-lg transition-all font-medium ${activeTab === 'pedido' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-300 hover:bg-slate-800 hover:text-white'}`}
              >
                <ShoppingCart className="w-5 h-5 mr-3 text-emerald-400" /> Pedido Farmacia
              </button>
            </nav>

            <div className="p-5 bg-slate-950 text-xs text-slate-500 font-medium">
              Sueroterapia Manager v1.3<br/>
              Optimizado para GitHub Pages.
            </div>
          </aside>

          <main className="flex-1 overflow-y-auto bg-slate-100 relative z-10 w-full">
            <header className="bg-white border-b border-gray-200 px-8 py-5 flex justify-between items-center no-print sticky top-0 z-10 shadow-sm">
              <h2 className="text-2xl font-bold text-gray-800 capitalize tracking-tight">
                {activeTab === 'dashboard' && 'Protocolos Disponibles'}
                {activeTab === 'calculator' && 'Planificación de Tratamiento'}
                {activeTab === 'import' && 'Añadir Protocolo Personalizado'}
                {activeTab === 'ficha' && 'Documentación Clínica'}
                {activeTab === 'pedido' && 'Gestión de Compras'}
              </h2>
              <div className="hidden md:flex text-sm font-semibold bg-blue-50 text-blue-800 px-4 py-1.5 rounded-full border border-blue-200 items-center shadow-sm">
                <Activity className="w-4 h-4 mr-2 text-blue-600"/>
                Activo: {selectedProtocol?.name || 'Sin protocolo'}
              </div>
            </header>

            <div className="p-6 md:p-10">
              {activeTab === 'dashboard' && renderDashboard()}
              {activeTab === 'calculator' && renderCalculator()}
              {activeTab === 'import' && renderImport()}
              {activeTab === 'ficha' && renderFicha()}
              {activeTab === 'pedido' && renderPedido()}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
